schema_version: 2

runtime:
  seed: 42
  device: auto
  deterministic: true

model:
  input_size: 31
  fast_units: 128
  slow_units: 128
  hidden_size: 320
  num_depth_outputs: 5
  dropout: 0.15
  tau_mode: stepwise

training:
  batch_size: 256
  epochs: 200
  gradient_clip: 0.8
  num_workers: 0
  optimizer:
    type: adam
    learning_rate: 0.005
    weight_decay: 0.00001
    betas: [0.9, 0.999]
    eps: 1e-8
  scheduler:
    type: cosine_annealing
    eta_min: 0.0001
  early_stopping:
    patience: 20
    min_delta: 0.0

loss:
  depth_weight: 0.5
  overflow_weight: 0.3
  intensity_weight: 0.2

data:
  use_reduced: true

evaluation:
  threshold_artifact: artifacts/thresholds/lnn_val_threshold.json

output:
  checkpoint_dir: artifacts/checkpoints/lnn
